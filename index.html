<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            /* Romantic Gradient Background */
            background: linear-gradient(to bottom, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #first-page {
            text-align: center;
            z-index: 10;
        }

        .heart-btn {
            padding: 20px 40px;
            font-size: 24px;
            color: white;
            background-color: #ff4d6d;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Falling Text Style */
        .falling-text {
            position: absolute;
            top: -50px;
            color: #ff0054;
            font-weight: bold;
            font-size: 20px;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="romantic-song.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="first-page">
        <button class="heart-btn" onclick="startSurprise()">View My Heart</button>
    </div>

    <script>
        function startSurprise() {
            // 1. Button hide karna
            document.getElementById('first-page').classList.add('hidden');

            // 2. Music play karna (User interaction ke baad hi auto-play hota hai)
            const music = document.getElementById('bgMusic');
            music.play();

            // 3. Name ki baarish shuru karna
            setInterval(createFallingText, 300);
        }

        function createFallingText() {
            const text = document.createElement('div');
            text.classList.add('falling-text');
            text.innerHTML = "I Love You Madhoo ❣️";
            
            // Random position and speed
            text.style.left = Math.random() * 100 + "vw";
            text.style.animationDuration = Math.random() * 3 + 2 + "s"; // 2-5 seconds
            text.style.opacity = Math.random();
            text.style.fontSize = Math.random() * 20 + 15 + "px";

            document.body.appendChild(text);

            // Memory saaf karne ke liye element delete karna
            setTimeout(() => {
                text.remove();
            }, 5000);
        }
    </script>
</body>
</html>
